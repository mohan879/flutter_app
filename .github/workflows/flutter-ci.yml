name: Flutter CI with Reports

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    
permissions:
  contents: read  
  security-events: write

jobs:
  flutter-ci:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout Code
      - name: Checkout
        uses: actions/checkout@v4
        
      # ✅ Initialize CodeQL (ADD HERE)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      # ✅ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ✅ Verify Versions (Debug)
      - name: Check Versions
        run: |
          flutter --version
          dart --version


      # ✅ Install Dependencies
      - name: Install dependencies
        run: flutter pub get

      # # ✅ Static Analysis
      # - name: Flutter Analyze
      #   run: flutter analyze --no-fatal-warnings

      # ✅ Unit Testing with Coverage
      - name: Run Tests
        run: flutter test --coverage
        continue-on-error: true
      
      - name: Upload reports
        if: always()
        run: echo "Uploading reports..."
        

      # ✅ Install Dart Code Metrics
      - name: Install Dart Metrics
        run: dart pub global activate dart_code_metrics

      # ✅ Generate JSON Report
      - name: Generate JSON Report
        run: |
          dart pub global run dart_code_metrics:metrics analyze lib \
          --reporter=json > dart-metrics.json

      # ✅ Generate HTML Report
      - name: Generate HTML Report
        run: |
          dart pub global run dart_code_metrics:metrics analyze lib \
          --reporter=html \
          --output-directory=dart-metrics-html

      # ✅ Enforce Quality Gate (fail if issues found)
      - name: Enforce Quality Gate
        run: |
          dart pub global run dart_code_metrics:metrics analyze lib \
          --fatal-style --fatal-performance

      # ✅ Upload JSON Report (for tools)
      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: dart-metrics-json
          path: dart-metrics.json

      # ✅ Upload HTML Report (for humans)
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: dart-metrics-html-report
          path: dart-metrics-html/
          
      # ✅ SAST - Semgrep
      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten"
      
      # ✅ CodeQL Analyze (ADD HERE)
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # ✅ Build APK
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk


